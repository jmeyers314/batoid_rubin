name: Build sdist and upload to PyPI

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  build_sdist:
    name: Build sdist and upload to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build setuptools_scm

      - name: Extract version
        run: |
          echo "PACKAGE_VERSION=$(python -c 'from setuptools_scm import get_version; print(get_version())')" >> $GITHUB_ENV
          python -c 'from setuptools_scm import get_version; print(get_version())'

      - name: Build sdist
        run: |
          python -m build --sdist .
          ls -l dist
          tar tvfz dist/batoid_rubin-*.tar.gz

      - name: Publish to TestPyPI if alpha
        if: "contains(env.PACKAGE_VERSION, 'a') && !contains(env.PACKAGE_VERSION, '.dev')"
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          verbose: true

      - name: Publish to PyPI if stable release
        if: "!contains(env.PACKAGE_VERSION, 'a') && !contains(env.PACKAGE_VERSION, '.dev')"
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
